<!doctype html><html><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neurology Quiz V2</title>
<style>
body{font-family:Arial;max-width:1000px;margin:auto;padding:20px}
.ans{display:block;width:100%;text-align:left;padding:12px;margin:8px 0;border:1px solid #ccc}
.correct{background:#b8f5b8}.wrong{background:#ffb6b6}
</style></head><body>
<h2>Neurology Quiz V2</h2>
<button onclick="start(false)">Sequential</button>
<button onclick="start(true)">Random</button>
<button onclick="redoMistakes()">Mistakes</button>
<div id="info"></div><h3 id="q"></h3><div id="a"></div>
<script src="questions.js"></script>
<script>
let pool=[],idx=0,mist=[];
function sh(x){return [...x].sort(()=>Math.random()-0.5);}
function prep(arr){return arr.map(v=>{let a=sh(v.answers);return{q:v.q,answers:a,c:a.findIndex(z=>z.correct)}});}
function beep(f){let c=new(AudioContext||webkitAudioContext)();let o=c.createOscillator();o.frequency=f;o.connect(c.destination);o.start();setTimeout(()=>{o.stop();c.close()},120);}
function start(r){pool=prep(r?sh(QUESTIONS):QUESTIONS);idx=0;show();}
function show(){
 if(idx>=pool.length){q.innerText='Finished';a.innerHTML='';return;}
 info.innerText=(idx+1)+'/'+pool.length+' | mistakes:'+mist.length;
 q.innerText=pool[idx].q;
 a.innerHTML='';
 pool[idx].answers.forEach((x,i)=>{
  let b=document.createElement('button');
  b.className='ans'; b.textContent=x.text;
  b.onclick=()=>{
   if(i===pool[idx].c){b.classList.add('correct');beep(900);setTimeout(()=>{idx++;show()},700);}
   else{b.classList.add('wrong');beep(250); if(!mist.includes(pool[idx]))mist.push(pool[idx]);}
  };
  a.appendChild(b);
 });
}
function redoMistakes(){pool=[...mist];idx=0;show();}
start(false);
</script></body></html>
